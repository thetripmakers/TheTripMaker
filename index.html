<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Trip Makers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:#0b0f1a;
    color:#fff;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    padding:15px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#050914;
    z-index:999;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    height:50px;
    border-radius:6px;
}

.logo-text{
    display:flex;
    flex-direction:column;
}

.brand{
    font-weight:700;
    font-size:20px;
    color:#1fa2a6;
}

.tagline{
    font-size:12px;
    color:#ff7a00;
}

/* NAV LINKS */
.nav-links a{
    color:#fff;
    margin-left:25px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ff7a00;
}

/* HERO */
.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1{
    font-size:55px;
}

.btn{
    padding:14px 30px;
    background:#ff7a00;
    border-radius:30px;
    color:#fff;
    text-decoration:none;
}

/* SECTIONS */
section{
    padding:100px 60px;
}

/* DESTINATIONS */
.cards{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    width:300px;
    height:400px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card h3{
    position:absolute;
    bottom:20px;
    left:20px;
}

/* CTA */
.cta{
    text-align:center;
    background:#ff7a00;
    padding:80px;
}

.cta a{
    background:#000;
    padding:15px 30px;
    border-radius:30px;
    color:#fff;
    text-decoration:none;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    background:#050914;
}

/* SOCIAL ICONS */
.social{
    margin-top:15px;
}

.social a{
    color:#fff;
    margin:0 10px;
    font-size:18px;
}

/* WHATSAPP BUTTON */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    color:#fff;
    font-size:22px;
}

/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:32px;}
section{padding:60px 20px;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">
    <img src="logo.png">
    <div class="logo-text">
        <span class="brand">The Trip Makers</span>
        <span class="tagline">Ek suhana safar</span>
    </div>
</div>

<div class="nav-links">
    <a href="#">Home</a>
    <a href="#dest">Destinations</a>
    <a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Curated Journeys, Unforgettable Memories</h1>
<a href="#dest" class="btn">Explore</a>
</div>
</section>

<!-- DESTINATIONS -->
<section id="dest">
<h2>Top Destinations</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1528181304800-259b08848526">
<h3>Thailand</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
<h3>Dubai</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2105c">
<h3>Maldives</h3>
</div>

</div>
</section>

<!-- CTA -->
<section id="contact" class="cta">
<h2>Plan Your Trip Now</h2>
<p>Call or WhatsApp: 9725083954</p>
<a href="https://wa.me/919725083954">Chat on WhatsApp</a>
</section>

<!-- FOOTER -->
<footer>

<p>© 2026 The Trip Makers</p>

<a href="https://www.facebook.com/thetripmakersfacebook" target="_blank"><i class="fab fa-facebook"></i></a>
<a href="https://www.linkedin.com/company/the-trip-makers-ek-suhana-safar/" target="_blank"><i class="fab fa-linkedin"></i></a>
<a href="mailto:inquiry@thetripmakers.co.in"><i class="fas fa-envelope"></i></a>
</div>

</footer>

<a href="https://wa.me/919725083954" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
